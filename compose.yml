# =============================================================================
# Hall Meal Manager — compose.yml (base configuration)
# =============================================================================
#
# This is the BASE compose file. It is always loaded.
# Layer additional files on top for environment-specific overrides:
#
#   Local dev:    docker compose up
#                 (compose.override.yml is auto-applied by Docker Compose)
#
#   Production:   docker compose -f compose.yml -f compose.prod.yml up -d
#
# Service dependency chain (startup order):
#   mysql + redis  →  app (PHP-FPM)  →  nginx  →  cloudflared (prod only)
#                                    ↳  scheduler
#                                    ↳  queue
#
# All services share emp_network (bridge). Only Nginx exposes port 80
# externally (via compose.override.yml in dev, Cloudflare Tunnel in prod).
#
# Required .env variables (copy .env.example → .env):
#   APP_KEY, DB_PASSWORD, DB_ROOT_PASSWORD, REDIS_PASSWORD, APP_URL
# =============================================================================

services:
  # ============================================================================
  # app — PHP-FPM (Laravel application process)
  # ============================================================================
  # Runs PHP-FPM on port 9000 (internal only). Nginx proxies all PHP requests
  # here. This service is also the base image for scheduler and queue — they
  # reuse the same image but override the command.
  #
  # Health check: nc -z 127.0.0.1 9000 (TCP socket open check).
  # Full dependency health (DB + Redis) is verified at the /health route.
  #
  # Resource limits: 1 CPU / 512MB RAM.
  # Watch for memory pressure during PDF exports (DomPDF) — each export can
  # consume 50–100MB temporarily. If OOM kills occur, raise memory limit here.
  #
  # Volumes:
  #   app_storage  — Laravel logs, sessions, cache, file uploads (persisted)
  #   app_public   — Vite-built assets shared with Nginx (read-only for Nginx)
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_NAME:-laravel}_app:latest
    container_name: ${APP_NAME:-laravel}_app
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - TZ=${TZ:-Asia/Dhaka}

      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}

      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379

      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - CACHE_STORE=${CACHE_STORE:-redis}
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION:-log}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}
      # TRUSTED_PROXIES=* allows Laravel to trust X-Forwarded-Proto from Nginx.
      # Required for https:// URL generation and Secure session cookies.
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-*}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emp_network
    volumes:
      - app_storage:/app/storage
      # app_public is also mounted by Nginx (read-only) to serve static files
      # directly from disk, bypassing PHP-FPM entirely.
      - app_public:/app/public

  # ============================================================================
  # nginx — Reverse proxy + static file server
  # ============================================================================
  # Sits in front of PHP-FPM. Responsibilities:
  #   1. Serve Vite build assets (/build/*) directly from app_public volume
  #      with 1-year immutable cache headers (content-hashed filenames).
  #   2. Proxy all PHP requests to app:9000 via FastCGI.
  #   3. Set HTTPS=on + X-Forwarded-Proto=https headers for Laravel (Cloudflare
  #      terminates TLS; Nginx forwards the context).
  #   4. Apply gzip compression and security headers.
  #   5. Serve the /health endpoint (used by cloudflared depends_on check).
  #
  # Config: nginx/default.conf (mounted read-only)
  # Health check: curl /health (verifies DB + Redis via Laravel)
  # Resource limits: 0.5 CPU / 64MB RAM (static file serving is cheap).
  # ============================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-laravel}_nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/app/public:ro
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
    networks:
      - emp_network

  # ============================================================================
  # scheduler — Laravel task scheduler (artisan schedule:work)
  # ============================================================================
  # Runs the Laravel scheduler loop (replaces a system cron).
  # Registered schedules (routes/console.php):
  #   - meal:check-dues     Daily 02:00 Asia/Dhaka — cancels future bookings
  #                         for students with negative balance > 2 months.
  #   - monitor-failed-jobs Every 15 minutes — logs error if failed_jobs > 0.
  #
  # Uses the same image as `app` — no separate build needed.
  # Disabled in local dev via compose.override.yml (profiles: donotstart).
  # Use `composer dev` locally which starts queue:listen directly.
  #
  # Resource limits: 0.25 CPU / 128MB RAM (low — runs infrequently).
  # ============================================================================
  scheduler:
    image: ${APP_NAME:-laravel}_app:latest
    container_name: ${APP_NAME:-laravel}_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - TZ=${TZ:-Asia/Dhaka}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - CACHE_STORE=${CACHE_STORE:-redis}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - emp_network
    volumes:
      - app_storage:/app/storage

  # ============================================================================
  # queue — Laravel queue worker (artisan queue:work)
  # ============================================================================
  # Processes jobs from the Redis queue.
  # Currently no application jobs are dispatched (app/Jobs/ is empty),
  # but this worker is ready for when async jobs are added.
  #
  # Worker flags:
  #   --tries=3      Retry a failed job up to 3 times before moving to failed_jobs.
  #   --backoff=5    Wait 5 seconds between retry attempts.
  #   --max-time=3600 Restart worker process every hour to prevent memory leaks.
  #
  # Failed jobs land in the failed_jobs table. The scheduler monitors this
  # every 15 minutes and logs an error. Retry manually:
  #   docker exec <app_container> php artisan queue:retry all
  #
  # Disabled in local dev via compose.override.yml (profiles: donotstart).
  # Resource limits: 0.5 CPU / 256MB RAM.
  # ============================================================================
  queue:
    image: ${APP_NAME:-laravel}_app:latest
    container_name: ${APP_NAME:-laravel}_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--backoff=5", "--max-time=3600"]
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - TZ=${TZ:-Asia/Dhaka}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - CACHE_STORE=${CACHE_STORE:-redis}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - emp_network
    volumes:
      - app_storage:/app/storage

  # ============================================================================
  # mysql — MySQL 8.0 database
  # ============================================================================
  # Stores all application data. Named volume mysql_data persists across
  # container restarts. Destroying this volume loses all data — back it up
  # before running `docker compose down -v`.
  #
  # Users:
  #   root    MYSQL_ROOT_PASSWORD (DB_ROOT_PASSWORD in .env) — superuser,
  #           used only by the healthcheck ping.
  #   laravel MYSQL_USER + MYSQL_PASSWORD — the app's database user.
  #           DB_USERNAME must NOT be 'root' — MySQL refuses to create a
  #           duplicate root user and the container entrypoint will error.
  #
  # Tuning flags:
  #   --max-connections=100   Matches expected load for a university hall app.
  #   --local-infile=0        Disables LOAD DATA LOCAL INFILE (security).
  #   --skip-name-resolve     Faster connection setup (no DNS lookup).
  #
  # Health check: mysqladmin ping via root. Service is only considered healthy
  # when MySQL is accepting connections, not just when the process is up.
  # ============================================================================
  mysql:
    image: mysql:8.0
    container_name: ${APP_NAME:-laravel}_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      # MYSQL_USER must NOT be 'root' — root is created automatically.
      # Use a separate app user; update DB_USERNAME/DB_PASSWORD in .env accordingly.
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --skip-name-resolve
      - --max-connections=100
      - --local-infile=0
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emp_network

  # ============================================================================
  # redis — Redis 7 (cache, sessions, queue)
  # ============================================================================
  # Used for three Laravel drivers: cache (CACHE_STORE), session
  # (SESSION_DRIVER), and queue (QUEUE_CONNECTION). All three are configured
  # to use Redis in production (compose.yml defaults).
  #
  # Persistence: --save 60 1 triggers an RDB snapshot every 60 seconds if at
  # least 1 key changed. This provides crash recovery for session data.
  # For stricter durability (queue jobs), consider adding --appendonly yes.
  #
  # Health check: redis-cli ping (returns PONG when ready).
  # Resource limits: 0.5 CPU / 256MB RAM.
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-laravel}_redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emp_network

networks:
  emp_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  # app_public: shared between app (write) and nginx (read-only).
  # Docker initialises the volume from app's /app/public on first start,
  # making Vite-built assets available to Nginx without a bind mount.
  app_public:
    driver: local
