services:
  app:
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  # ====================================
  #         Cloudflare Tunnel
  # ====================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${APP_NAME:-laravel}_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - emp_network
