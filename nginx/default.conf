server {
    listen 80;
    server_name _;
    root /app/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Bulk CSV import limit (admin uploads student lists)
    client_max_body_size 20M;

    # Serve static files directly; fall through to PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Vite build assets — immutable, cache 1 year
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # PHP-FPM — pass .php requests to app container
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Tell Laravel the original request was HTTPS (Cloudflare terminates TLS).
        # TRUSTED_PROXIES=* in .env allows Laravel to trust these headers,
        # making url()/asset() generate https:// and session cookies secure.
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;

        # Generous timeout for PDF exports and bulk imports
        fastcgi_read_timeout 120s;

        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }
}
