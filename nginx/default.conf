# =============================================================================
# Hall Meal Manager — nginx/default.conf
# =============================================================================
#
# Nginx reverse proxy configuration for the Laravel + PHP-FPM setup.
#
# Traffic path:
#   Cloudflare (TLS termination) → cloudflared tunnel → nginx:80
#   → static files served from disk (app_public volume)
#   → or PHP-FPM at app:9000 via FastCGI
#
# This file is mounted read-only into the nginx container:
#   ./nginx/default.conf → /etc/nginx/conf.d/default.conf
#
# After editing this file, reload Nginx without downtime:
#   docker exec <nginx_container> nginx -s reload
#
# To validate config before reloading:
#   docker exec <nginx_container> nginx -t
# =============================================================================

server {
    listen 80;
    # Accept any Host header — domain is enforced at Cloudflare level.
    server_name _;
    root /app/public;
    index index.php;

    # ── Security headers ──────────────────────────────────────────────────────
    # X-Frame-Options: prevents clickjacking (SAMEORIGIN = only same-domain frames).
    # X-Content-Type-Options: prevents MIME sniffing attacks.
    # X-XSS-Protection: enables browser XSS filter (legacy browsers).
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ── Gzip compression ──────────────────────────────────────────────────────
    # Reduces payload size for text-based responses.
    # gzip_min_length 1024: don't compress tiny responses (overhead not worth it).
    # Cloudflare also compresses cached responses at the edge, but this handles
    # dynamic PHP responses that are not edge-cached.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Upload size limit ─────────────────────────────────────────────────────
    # 20MB covers the admin bulk-import CSV feature (student registration lists).
    # If admins report 413 errors on large imports, raise this value.
    client_max_body_size 20M;

    # ── Static file serving ───────────────────────────────────────────────────
    # try_files checks for a real file or directory before falling through to
    # index.php (the Laravel front controller). This means CSS, JS, images,
    # and fonts are served from disk without touching PHP-FPM.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Vite build assets (immutable cache) ───────────────────────────────────
    # Vite generates content-hashed filenames (e.g. app.Dj3kL9xM.js).
    # A changed file gets a new hash → new URL → browsers always fetch fresh.
    # Safe to cache for 1 year with immutable directive.
    # These files are served directly from the app_public volume — zero PHP overhead.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Hidden file protection ────────────────────────────────────────────────
    # Denies access to dotfiles (.env, .git, .htaccess).
    # .dockerignore excludes .env from the image, but this is a safety net.
    location ~ /\. {
        deny all;
    }

    # ── PHP-FPM (FastCGI) ─────────────────────────────────────────────────────
    # All .php requests are forwarded to the app container on port 9000.
    # SCRIPT_FILENAME uses $realpath_root (resolves symlinks) + script name.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # ── HTTPS context forwarding ──────────────────────────────────────────
        # Cloudflare terminates TLS. Inside the tunnel, traffic is HTTP.
        # These params tell PHP/Laravel the original request was HTTPS:
        #   HTTPS=on                    → $_SERVER['HTTPS'] = 'on'
        #   HTTP_X_FORWARDED_PROTO=https → X-Forwarded-Proto header
        # Laravel reads these via TRUSTED_PROXIES=* (set in compose.yml).
        # Effect: url(), asset(), redirect() all generate https:// URLs.
        #         Session cookies get the Secure flag.
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;

        # ── Timeout ───────────────────────────────────────────────────────────
        # 120s covers two slow operations in this app:
        #   1. PDF export via DomPDF (admin meal-requests/export)
        #   2. Bulk student CSV import (admin students/bulk)
        # Default fastcgi_read_timeout is 60s — too short for these.
        fastcgi_read_timeout 120s;

        # ── Buffer tuning ─────────────────────────────────────────────────────
        # 16k buffers reduce disk I/O for typical Inertia JSON responses.
        # For very large responses (PDF binary), Nginx spills to temp files
        # automatically — no change needed.
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }
}
